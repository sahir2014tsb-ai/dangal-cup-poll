<!DOCTYPE html>
<html>
<head>
<title>Dangal Cup</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to bottom,#000,#222);
    color:white;
    text-align:center;
}

.top{
    padding:60px 20px;
}

.school{
    color:gold;
    font-size:28px;
    font-weight:bold;
}

h1{
    font-size:64px;
    color:gold;
    text-shadow:0 0 20px gold;
    margin:10px;
}

.subtitle{
    font-size:20px;
}

.box{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.poll{
    background:#111;
    border:2px solid gold;
    border-radius:20px;
    padding:25px;
    margin:20px;
}

button{
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.yes{background:limegreen;}
.maybe{background:orange;}
.no{background:red;color:white;}

.linkbtn{
    display:inline-block;
    padding:15px 25px;
    background:gold;
    color:black;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    margin-top:20px;
}

footer{
    padding:30px;
    background:#111;
    margin-top:40px;
    border-top:2px solid gold;
}

.email{
    color:gold;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="top">
    <div class="school">Shiv Nader School</div>
    <h1>DANGAL CUP</h1>
    <p class="subtitle">The Official 7th Grade Football League</p>
</div>

<div class="box">

<div class="poll">
    <h2>Should Dangal Cup happen?</h2>

    <button class="yes" onclick="vote('yes')">YES</button>
    <button class="maybe" onclick="vote('maybe')">MAYBE</button>
    <button class="no" onclick="vote('no')">NO</button>

    <p>Yes: <span id="yes">0</span></p>
    <p>Maybe: <span id="maybe">0</span></p>
    <p>No: <span id="no">0</span></p>

    <p id="msg"></p>
</div>

<a class="linkbtn" href="about.html">What is Dangal Cup?</a>

</div>

<footer>
    <p>If you want to play, hit this email up:</p>
    <div class="email">sahirsharma2014@gmail.com</div>
</footer>

<script>
let votes = {yes:0, maybe:0, no:0};

function vote(type){
    if(localStorage.getItem("voted")){
        document.getElementById("msg").innerHTML = "You already voted.";
        return;
    }

    votes[type]++;

    document.getElementById("yes").innerHTML = votes.yes;
    document.getElementById("maybe").innerHTML = votes.maybe;
    document.getElementById("no").innerHTML = votes.no;

    localStorage.setItem("voted","true");
    document.getElementById("msg").innerHTML = "Vote submitted.";
}
</script>

</body>
</html>
